<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>XAU/USD - Consistent Challenge ⚖️</title>
    <!-- Import Font FinTech Modern -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #050505;
            --card-bg: #121212;
            --accent: #e5c07b; /* Gold untuk XAU/USD */
            --success: #00f291;
            --danger: #ff4d4d;
            --text-main: #ffffff;
            --text-dim: #888888;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            line-height: 1.5;
        }

        .app-container {
            width: 100%;
            max-width: 600px;
            min-height: 100vh;
            padding: 20px 16px 120px 16px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .logo { font-weight: 800; font-size: 1.1rem; letter-spacing: -0.5px; color: var(--accent); }
        
        #current-time {
            font-family: 'JetBrains Mono', monospace;
            background: var(--glass);
            padding: 6px 12px;
            border-radius: 8px;
            border: 1px solid var(--border);
            font-size: 0.85rem;
        }

        /* Stats Grid */
        .dashboard {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            padding: 16px;
            border-radius: 16px;
            position: relative;
        }

        .stat-card::after {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 3px; background: var(--accent); opacity: 0.3;
        }

        .stat-label { font-size: 0.6rem; color: var(--text-dim); text-transform: uppercase; font-weight: 700; letter-spacing: 1px; }
        .stat-value { font-size: 1.2rem; font-weight: 800; margin-top: 4px; display: block; }

        /* Currency Hub */
        .currency-hub {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
            overflow-x: auto;
            padding-bottom: 8px;
        }

        .curr-pill {
            background: var(--glass);
            border: 1px solid var(--border);
            padding: 8px 14px;
            border-radius: 100px;
            white-space: nowrap;
            font-size: 0.7rem;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .curr-pill b { color: var(--accent); }

        /* Setup Panel */
        .config-card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 30px;
            border: 1px solid var(--border);
        }

        .grid-inputs {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        .input-group { display: flex; flex-direction: column; gap: 6px; }
        .input-group label { font-size: 0.6rem; color: var(--text-dim); font-weight: 700; text-transform: uppercase; }
        .input-group input {
            background: #1a1a1a;
            border: 1px solid var(--border);
            color: white;
            padding: 12px;
            border-radius: 10px;
            font-size: 0.85rem;
            transition: 0.3s;
        }
        .input-group input:focus { border-color: var(--accent); }

        /* Journal List */
        .day-row {
            background: var(--card-bg);
            border-radius: 16px;
            margin-bottom: 16px;
            padding: 20px;
            border: 1px solid var(--border);
        }

        .day-meta {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 15px;
        }

        .day-title { font-weight: 800; font-size: 0.85rem; }
        .day-target { font-size: 0.65rem; color: var(--accent); margin-top: 4px; font-weight: 600; }
        .day-date { font-size: 0.7rem; color: var(--text-dim); }

        .layers-wrapper {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(85px, 1fr));
            gap: 10px;
        }

        .layer-node {
            background: #1a1a1a;
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px 8px;
            text-align: center;
            cursor: pointer;
            transition: 0.2s;
        }

        .node-label { font-size: 0.55rem; color: var(--text-dim); display: block; margin-bottom: 4px; }
        .node-status { font-weight: 800; font-size: 0.7rem; }

        .win { background: rgba(0, 242, 145, 0.1) !important; border-color: var(--success) !important; color: var(--success); }
        .loss { background: rgba(255, 77, 77, 0.1) !important; border-color: var(--danger) !important; color: var(--danger); }

        /* Sticky Footer */
        .floating-footer {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: calc(100% - 32px);
            max-width: 568px;
            background: rgba(18, 18, 18, 0.85);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            padding: 14px 20px;
            border-radius: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
            z-index: 100;
        }

        @media (min-width: 768px) {
            .grid-inputs { grid-template-columns: repeat(3, 1fr); }
        }
    </style>
</head>
<body>

<div class="app-container">
    <header>
        <div class="logo">XAU/USD CONSISTENT CHALLENGE</div>
        <div id="current-time">00:00:00</div>
    </header>

    <!-- Stats Dashboard -->
    <div class="dashboard">
        <div class="stat-card">
            <span class="stat-label">Net Profit (Cent)</span>
            <span id="total-p" class="stat-value" style="color: var(--success);">0.0</span>
        </div>
        <div class="stat-card">
            <span class="stat-label">Win Rate %</span>
            <span id="win-rate" class="stat-value" style="color: var(--accent);">0%</span>
        </div>
    </div>

    <!-- Multi-Currency Wallet -->
    <div class="currency-hub">
        <div class="curr-pill">Wallet: <b id="c-cent">0c</b></div>
        <div class="curr-pill">USD: <b id="c-usd">$0.00</b></div>
        <div class="curr-pill">IDR: <b id="c-idr">Rp0</b></div>
    </div>

    <!-- Configuration -->
    <div class="config-card">
        <div style="margin-bottom: 16px; font-weight: 800; font-size: 0.75rem; letter-spacing: 1px; color: var(--text-dim);">STRATEGY SETTINGS</div>
        <div class="grid-inputs">
            <div class="input-group">
                <label>Capital (Cent)</label>
                <input type="number" id="capital" value="500" onchange="saveConfig()">
            </div>
            <div class="input-group">
                <label>Risk Per Layer %</label>
                <input type="number" id="risk-percent" value="1" onchange="saveConfig()">
            </div>
            <div class="input-group">
                <label>Reward Ratio (1:X)</label>
                <input type="number" id="risk-ratio" value="2" onchange="saveConfig()">
            </div>
            <div class="input-group">
                <label>USD Rate (IDR)</label>
                <input type="number" id="usd-rate" value="16000" onchange="saveConfig()">
            </div>
            <div class="input-group">
                <label>Max Layers</label>
                <input type="number" id="layers" value="3" onchange="saveConfig()">
            </div>
            <div class="input-group">
                <label>Start Date</label>
                <input type="date" id="start-date" onchange="saveConfig()">
            </div>
        </div>
    </div>

    <!-- Dynamic Journal -->
    <div id="journal-list"></div>

    <!-- Footer Summary -->
    <div class="floating-footer">
        <div>
            <div style="font-size: 0.55rem; color: var(--text-dim); letter-spacing: 1px;">TOTAL BALANCE (IDR)</div>
            <div id="float-idr" style="font-weight: 800; font-size: 1rem; color: var(--accent);">Rp0</div>
        </div>
        <div style="text-align: right;">
            <div style="font-size: 0.55rem; color: var(--text-dim); letter-spacing: 1px;">SYSTEM</div>
            <div style="font-size: 0.7rem; font-weight: 800; color: var(--success);">ALGO SYNCED</div>
        </div>
    </div>
</div>

<script>
    function updateClock() {
        const now = new Date();
        document.getElementById('current-time').innerText = now.toLocaleTimeString('en-GB', { timeZone: 'Asia/Jakarta' });
    }
    setInterval(updateClock, 1000);

    function saveConfig() {
        const config = {
            cap: document.getElementById('capital').value,
            rate: document.getElementById('usd-rate').value,
            riskP: document.getElementById('risk-percent').value,
            riskR: document.getElementById('risk-ratio').value,
            layers: document.getElementById('layers').value,
            date: document.getElementById('start-date').value
        };
        localStorage.setItem('xau_master_v1', JSON.stringify(config));
        renderJournal();
    }

    function renderJournal() {
        const conf = JSON.parse(localStorage.getItem('xau_master_v1')) || { cap: 500, rate: 16000, riskP: 1, riskR: 2, layers: 3 };
        const list = document.getElementById('journal-list');
        list.innerHTML = '';
        
        let totalProfit = 0;
        let totalWin = 0;
        let totalLoss = 0;

        const slValue = (conf.cap * (conf.riskP / 100));
        const tpValue = slValue * conf.riskR;

        for(let d=1; d<=30; d++) {
            const card = document.createElement('div');
            card.className = 'day-row';
            
            let dateLabel = "Set Date";
            if(conf.date) {
                let dt = new Date(conf.date);
                dt.setDate(dt.getDate() + (d-1));
                dateLabel = dt.toLocaleDateString('id-ID', {weekday:'short', day:'numeric', month:'short'});
            }

            card.innerHTML = `
                <div class="day-meta">
                    <div>
                        <span class="day-title">DAY ${d}</span>
                        <div class="day-target">🎯 TP +${tpValue.toFixed(1)}c | SL -${slValue.toFixed(1)}c per layer</div>
                    </div>
                    <span class="day-date">${dateLabel}</span>
                </div>
                <div class="layers-wrapper" id="grid-d${d}"></div>
            `;
            list.appendChild(card);

            const grid = document.getElementById(`grid-d${d}`);
            for(let l=1; l<=conf.layers; l++) {
                const key = `xm1_d${d}_l${l}`;
                const state = localStorage.getItem(key);
                const node = document.createElement('div');
                node.className = `layer-node ${state === 'W' ? 'win' : state === 'L' ? 'loss' : ''}`;
                
                let displayChange = `L${l}`;
                if(state === 'W') { totalProfit += tpValue; totalWin++; displayChange = `+${tpValue.toFixed(1)}`; }
                if(state === 'L') { totalProfit -= slValue; totalLoss++; displayChange = `-${slValue.toFixed(1)}`; }

                node.innerHTML = `
                    <span class="node-label">${displayChange}</span>
                    <span class="node-status">${state || 'READY'}</span>
                `;
                node.onclick = () => {
                    if(!state) localStorage.setItem(key, 'W');
                    else if(state === 'W') localStorage.setItem(key, 'L');
                    else localStorage.removeItem(key);
                    renderJournal();
                };
                grid.appendChild(node);
            }
        }
        
        // Stats Calculation
        document.getElementById('total-p').innerText = (totalProfit >= 0 ? '+' : '') + totalProfit.toFixed(1);
        const wr = (totalWin + totalLoss) > 0 ? (totalWin / (totalWin + totalLoss) * 100).toFixed(0) : 0;
        document.getElementById('win-rate').innerText = wr + '%';

        // Currency Conversion
        const finalCent = parseFloat(conf.cap) + totalProfit;
        const finalUsd = finalCent / 100;
        const finalIdr = finalUsd * conf.rate;

        document.getElementById('c-cent').innerText = finalCent.toFixed(0) + 'c';
        document.getElementById('c-usd').innerText = '$' + finalUsd.toFixed(2);
        const formattedIdr = 'Rp' + Math.floor(finalIdr).toLocaleString('id-ID');
        document.getElementById('c-idr').innerText = formattedIdr;
        document.getElementById('float-idr').innerText = formattedIdr;
    }

    // Load Initial Data
    const saved = JSON.parse(localStorage.getItem('xau_master_v1'));
    if(saved) {
        document.getElementById('capital').value = saved.cap;
        document.getElementById('usd-rate').value = saved.rate;
        document.getElementById('risk-percent').value = saved.riskP;
        document.getElementById('risk-ratio').value = saved.riskR;
        document.getElementById('layers').value = saved.layers;
        document.getElementById('start-date').value = saved.date || '';
    }
    renderJournal();
    updateClock();
</script>

</body>
</html>
