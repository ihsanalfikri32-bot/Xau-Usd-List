<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TRADE LIST - Super Dashboard 📈</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        :root {
            --bg: #020202; --card: #0d0d0d; --accent: #00d2ff;
            --success: #00ff88; --danger: #ff3131; --warning: #ffea00; --text: #ffffff;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg); color: var(--text); margin: 0; padding: 10px;
            display: flex; flex-direction: column; align-items: center;
        }
        .container { width: 100%; max-width: 480px; padding-bottom: 50px; }
        
        /* Glassmorphism Clock */
        .market-clock {
            background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px);
            padding: 20px; border-radius: 15px; text-align: center; margin-bottom: 20px;
            border: 1px solid rgba(0, 210, 255, 0.3); box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        #current-time { font-family: 'Courier New', monospace; font-size: 1.8rem; color: var(--accent); font-weight: 900; text-shadow: 0 0 15px var(--accent); }
        .session-info { font-size: 0.7rem; color: #777; margin-top: 8px; font-weight: bold; letter-spacing: 2px; }

        /* Super Config Panel */
        .config-panel {
            background: var(--card); padding: 20px; border-radius: 15px; 
            margin-bottom: 25px; border: 1px solid #1a1a1a; display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
        }
        .config-group { display: flex; flex-direction: column; gap: 6px; }
        .config-group label { font-size: 0.6rem; color: #555; text-transform: uppercase; font-weight: 800; }
        .config-group input, .config-group select {
            background: #000; border: 1px solid #222; color: #fff; padding: 10px; border-radius: 8px; font-size: 0.85rem; outline: none; transition: 0.3s;
        }
        .config-group input:focus { border-color: var(--accent); box-shadow: 0 0 10px rgba(0, 210, 255, 0.2); }

        /* Stats Summary */
        .summary { 
            display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px;
        }
        .stat-box { background: #111; padding: 15px; border-radius: 10px; border-bottom: 3px solid var(--accent); }
        .stat-label { font-size: 0.6rem; color: #666; display: block; margin-bottom: 5px; }
        .stat-val { font-size: 1.1rem; font-weight: bold; }

        /* Journal Cards */
        .day-card { 
            background: var(--card); margin-bottom: 15px; padding: 18px; 
            border-radius: 12px; border: 1px solid #1a1a1a; transition: 0.3s;
        }
        .day-header { display: flex; justify-content: space-between; align-items: flex-start; }
        .risk-badge { font-size: 0.6rem; background: rgba(0, 210, 255, 0.1); color: var(--accent); padding: 3px 8px; border-radius: 5px; margin-top: 10px; display: inline-block; }
        
        .layer-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(40px, 1fr)); gap: 8px; margin-top: 15px; }
        .layer-btn { 
            aspect-ratio: 1/1; border: 1px solid #222; background: #050505; color: #444; 
            border-radius: 8px; font-size: 0.7rem; font-weight: 900; transition: 0.2s; cursor: pointer;
        }
        .layer-win { background: var(--success) !important; color: #000 !important; border-color: var(--success) !important; box-shadow: 0 0 15px rgba(0, 255, 136, 0.2); }
        .layer-loss { background: var(--danger) !important; color: #fff !important; border-color: var(--danger) !important; }

        .footer { text-align: center; margin-top: 30px; font-size: 0.6rem; color: #333; text-transform: uppercase; letter-spacing: 3px; }
    </style>
</head>
<body>

<div class="container">
    <div class="market-clock">
        <div id="current-time">00:00:00</div>
        <div class="session-info">MARKET SESSION GMT+7 🌐</div>
    </div>

    <div class="config-panel">
        <div class="config-group" style="grid-column: span 2;">
            <label>Master Strategy / Market Name 💎</label>
            <input type="text" id="m-name" value="XAU/USD CONSISTENT" onchange="saveConfig()">
        </div>
        <div class="config-group">
            <label>Base Capital 💰</label>
            <input type="number" id="capital" value="500" onchange="saveConfig()">
        </div>
        <div class="config-group">
            <label>Account Model 🏦</label>
            <select id="acc-type" onchange="saveConfig()">
                <option value="c">Cent Account</option>
                <option value="$">Standard ($)</option>
                <option value="Prop">Prop Firm</option>
            </select>
        </div>
        <div class="config-group">
            <label>Risk Ratio (1:X) 🛡️</label>
            <input type="number" id="risk-ratio" value="2" onchange="saveConfig()">
        </div>
        <div class="config-group">
            <label>Daily Layer Limit 🪜</label>
            <input type="number" id="layers" value="3" onchange="saveConfig()">
        </div>
        <div class="config-group" style="grid-column: span 2;">
            <label>Challenge Start Date 📅</label>
            <input type="date" id="start-date" onchange="saveConfig()">
        </div>
    </div>

    <div class="summary">
        <div class="stat-box">
            <span class="stat-label">ACCUMULATED PROFIT</span>
            <span class="stat-val" id="total-p" style="color:var(--success)">0</span>
        </div>
        <div class="stat-box">
            <span class="stat-label">WIN RATE %</span>
            <span class="stat-val" id="win-rate" style="color:var(--accent)">0%</span>
        </div>
    </div>

    <div id="journal-list"></div>

    <div class="footer">
        Trade List Super System • Alpha 2026
    </div>
</div>

<script>
    function updateClock() {
        const timeStr = new Date().toLocaleTimeString('en-GB', { timeZone: 'Asia/Jakarta' });
        document.getElementById('current-time').innerText = timeStr;
    }
    setInterval(updateClock, 1000);

    function saveConfig() {
        const config = {
            name: document.getElementById('m-name').value,
            date: document.getElementById('start-date').value,
            cap: document.getElementById('capital').value,
            type: document.getElementById('acc-type').value,
            risk: document.getElementById('risk-ratio').value,
            layers: document.getElementById('layers').value
        };
        localStorage.setItem('super_trade_config', JSON.stringify(config));
        renderJournal();
    }

    function renderJournal() {
        const conf = JSON.parse(localStorage.getItem('super_trade_config')) || { name: 'XAU/USD', cap: 500, type: 'c', risk: 2, layers: 3 };
        const list = document.getElementById('journal-list');
        list.innerHTML = '';
        
        let totalProfit = 0;
        let totalWin = 0;
        let totalLoss = 0;

        for(let d=1; d<=30; d++) {
            const card = document.createElement('div');
            card.className = 'day-card';
            
            let dStr = "Set Date";
            if(conf.date) {
                let dt = new Date(conf.date);
                dt.setDate(dt.getDate() + (d-1));
                dStr = dt.toLocaleDateString('id-ID', {weekday:'short', day:'numeric', month:'short'});
                if(dt.getDay() === 6 || dt.getDay() === 0) card.style.opacity = "0.5";
            }

            card.innerHTML = `
                <div class="day-header">
                    <div>
                        <div style="font-weight:900; font-size:0.8rem; letter-spacing:1px">${conf.name} DAY ${d}</div>
                        <div class="risk-badge">REWARD RATIO 1:${conf.risk}</div>
                    </div>
                    <span style="font-size:0.7rem; color:var(--accent); font-weight:bold">${dStr}</span>
                </div>
                <div class="layer-grid" id="grid-d${d}"></div>
            `;
            list.appendChild(card);

            const grid = document.getElementById(`grid-d${d}`);
            for(let l=1; l<=conf.layers; l++) {
                const key = `sl_d${d}_l${l}`;
                const st = localStorage.getItem(key);
                const btn = document.createElement('button');
                btn.className = `layer-btn ${st === 'W' ? 'layer-win' : st === 'L' ? 'layer-loss' : ''}`;
                btn.innerText = st || l;
                
                if(st === 'W') { totalProfit += (1 * conf.risk); totalWin++; }
                if(st === 'L') { totalProfit -= 1; totalLoss++; }

                btn.onclick = () => {
                    if(!st) localStorage.setItem(key, 'W');
                    else if(st === 'W') localStorage.setItem(key, 'L');
                    else localStorage.removeItem(key);
                    renderJournal();
                };
                grid.appendChild(btn);
            }
        }
        
        document.getElementById('total-p').innerText = totalProfit.toFixed(1) + conf.type;
        const wr = (totalWin + totalLoss) > 0 ? (totalWin / (totalWin + totalLoss) * 100).toFixed(0) : 0;
        document.getElementById('win-rate').innerText = wr + '%';
    }

    const saved = JSON.parse(localStorage.getItem('super_trade_config'));
    if(saved) {
        document.getElementById('m-name').value = saved.name;
        document.getElementById('start-date').value = saved.date;
        document.getElementById('capital').value = saved.cap;
        document.getElementById('acc-type').value = saved.type;
        document.getElementById('risk-ratio').value = saved.risk;
        document.getElementById('layers').value = saved.layers;
    }
    renderJournal();
    updateClock();
</script>
</body>
</html>
